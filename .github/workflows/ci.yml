name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }} quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Lint
        run: make lint

      - name: Pytest
        run: make pytest

      - name: Type check
        run: make type

      - name: Compile
        run: make compile

      - name: Docs smoke
        run: make docs-smoke

      - name: AI smoke
        run: make ai-smoke

      - name: MCP smoke
        run: make mcp-smoke

      - name: Version smoke
        run: make version-smoke

      - name: Pytest governance smoke
        run: make pytest-governance-smoke

  package:
    name: Package smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wheel and sdist install smoke
        run: make mcp-install-smoke

  docker:
    name: Docker sandbox quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker sandbox gate
        run: make docker-quality
