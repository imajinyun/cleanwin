name: PyPI Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint
        run: make lint

      - name: Pytest
        run: make pytest

      - name: Type check
        run: make type

      - name: Compile
        run: make compile

      - name: Docs smoke
        run: make docs-smoke

      - name: AI smoke
        run: make ai-smoke

      - name: MCP smoke
        run: make mcp-smoke

      - name: Version smoke
        run: make version-smoke

      - name: Governance smoke
        run: make pytest-governance-smoke

  pypi-publish:
    name: Build and publish to PyPI
    needs: quality
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cleanwin
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: |
          python -m build --sdist --wheel

      - name: Verify package metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
