name: Windows Portable Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint
        run: make lint

      - name: Pytest
        run: make pytest

      - name: Type check
        run: make type

      - name: Compile
        run: make compile

      - name: Docs smoke
        run: make docs-smoke

      - name: AI smoke
        run: make ai-smoke

      - name: MCP smoke
        run: make mcp-smoke

      - name: Version smoke
        run: make version-smoke

      - name: Governance smoke
        run: make pytest-governance-smoke

  portable:
    name: Build Windows portable CLI
    needs: quality
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and install release tooling
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip build pyinstaller
          .\.venv\Scripts\python.exe -m pip install .
          .\.venv\Scripts\python.exe -m build --sdist --wheel

      - name: Build portable executables
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\portable | Out-Null
          .\.venv\Scripts\pyinstaller.exe --clean --noconfirm --onefile --collect-data cleanwincli --name cleanwin cleanwin.py
          .\.venv\Scripts\pyinstaller.exe --clean --noconfirm --onefile --collect-data cleanwincli --name cleanwin-mcp cleanwincli\mcp_server.py
          Copy-Item dist\cleanwin.exe artifacts\portable\cleanwin.exe
          Copy-Item dist\cleanwin-mcp.exe artifacts\portable\cleanwin-mcp.exe
          Copy-Item LICENSE artifacts\portable\LICENSE
          Copy-Item README.md artifacts\portable\README.md
          @'
          cleanwin Windows portable CLI

          Commands:
            cleanwin.exe --json doctor
            cleanwin-mcp.exe

          Safety posture:
            Default workflows are inventory, planning, validation, and review.
            Cleanup execution remains gated by plan validation, explicit flags,
            operation logs, recycle mode, confirmation phrase, and dry-run token.
          '@ | Set-Content -Encoding utf8 artifacts\portable\README.txt

      - name: Smoke portable executables
        shell: pwsh
        run: |
          $doctor = .\artifacts\portable\cleanwin.exe --json doctor | ConvertFrom-Json
          if (-not $doctor.ready) { throw "portable cleanwin doctor reported not ready" }
          $mcpInitialize = @{ jsonrpc = "2.0"; id = 1; method = "initialize" } | ConvertTo-Json -Compress
          $mcpResponse = $mcpInitialize | .\artifacts\portable\cleanwin-mcp.exe | ConvertFrom-Json
          if ($mcpResponse.result.serverInfo.name -ne "cleanwin-mcp") { throw "portable cleanwin MCP initialize failed" }

      - name: Create portable archive and checksum
        shell: pwsh
        run: |
          $version = .\.venv\Scripts\python.exe -c "from cleanwincli import __version__; print(__version__)"
          $archive = "cleanwin-$version-windows-x64.zip"
          Compress-Archive -Path artifacts\portable\* -DestinationPath "artifacts\$archive" -Force
          $hash = (Get-FileHash "artifacts\$archive" -Algorithm SHA256).Hash
          "$hash  $archive" | Set-Content -Encoding ascii "artifacts\$archive.sha256"
          $installerHash = (Get-FileHash "install.ps1" -Algorithm SHA256).Hash
          "$installerHash  install.ps1" | Set-Content -Encoding ascii "artifacts\install.ps1.sha256"
          @{
            schema = "cleanwin.windows-portable-release.v1"
            version = $version
            archive = $archive
            sha256 = $hash
            installer_type = "zip"
            nested_installer_type = "portable"
            commands = @("cleanwin.exe", "cleanwin-mcp.exe")
            portable_zip_ready = $true
            powershell_installer_ready = $true
            install_script = "install.ps1"
          } | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 artifacts\windows-portable-release.json

      - name: Smoke installer end-to-end
        shell: pwsh
        run: |
          $version = .\.venv\Scripts\python.exe -c "from cleanwincli import __version__; print(__version__)"
          $archive = "cleanwin-$version-windows-x64.zip"
          $archivePath = Resolve-Path "artifacts\$archive"
          $checksumPath = Resolve-Path "artifacts\$archive.sha256"
          $installerPath = Resolve-Path "install.ps1"

          $installRoot = Join-Path $env:TEMP ("cleanwin-install-smoke-" + [Guid]::NewGuid().ToString())
          $installDir = Join-Path $installRoot "cleanwin"

          try {
            $mockRelease = @{
              tag_name = "v$version"
              assets = @(
                @{ name = $archive; browser_download_url = "file://$archivePath" },
                @{ name = "$archive.sha256"; browser_download_url = "file://$checksumPath" }
              )
            }
            $mockReleaseJson = $mockRelease | ConvertTo-Json -Depth 4 -Compress
            $mockReleasePath = Join-Path $installRoot "release.json"
            Set-Content -Path $mockReleasePath -Value $mockReleaseJson -Encoding utf8

            $mockInstaller = Join-Path $installRoot "install-smoke.ps1"
            $installerContent = Get-Content -LiteralPath $installerPath -Raw
            $installerContent = $installerContent -replace [regex]::Escape('Invoke-RestMethod -Uri $ReleaseApi -Headers @{ "User-Agent" = "cleanwin-installer" }'), "Get-Content -LiteralPath '$mockReleasePath' -Raw | ConvertFrom-Json"
            $installerContent = $installerContent -replace [regex]::Escape('Invoke-WebRequest -Uri $ArchiveAsset.browser_download_url -OutFile $ArchivePath -Headers @{ "User-Agent" = "cleanwin-installer" }'), 'Copy-Item -LiteralPath ([Uri]$ArchiveAsset.browser_download_url).LocalPath -Destination $ArchivePath'
            $installerContent = $installerContent -replace [regex]::Escape('Invoke-WebRequest -Uri $ChecksumAsset.browser_download_url -OutFile $ChecksumPath -Headers @{ "User-Agent" = "cleanwin-installer" }'), 'Copy-Item -LiteralPath ([Uri]$ChecksumAsset.browser_download_url).LocalPath -Destination $ChecksumPath'
            Set-Content -Path $mockInstaller -Value $installerContent -Encoding utf8

            & $mockInstaller -InstallDir $installDir -NoPathUpdate
            if (-not (Test-Path (Join-Path $installDir "cleanwin.exe") -PathType Leaf)) { throw "install failed: cleanwin.exe missing" }
            if (-not (Test-Path (Join-Path $installDir "cleanwin-mcp.exe") -PathType Leaf)) { throw "install failed: cleanwin-mcp.exe missing" }
            $doctor = & (Join-Path $installDir "cleanwin.exe") --json doctor | ConvertFrom-Json
            if (-not $doctor.ready) { throw "installed cleanwin doctor not ready" }

            & $mockInstaller -InstallDir $installDir -NoPathUpdate
            Write-Host "reinstall (same version) completed without error"

            & $mockInstaller -InstallDir $installDir -Uninstall -NoPathUpdate
            if (Test-Path $installDir) { throw "uninstall failed: directory still exists" }
            Write-Host "uninstall completed successfully"
          } finally {
            if (Test-Path $installRoot) {
              Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload portable release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleanwin-windows-portable-release
          path: |
            artifacts/cleanwin-*-windows-x64.zip
            artifacts/cleanwin-*-windows-x64.zip.sha256
            artifacts/install.ps1.sha256
            artifacts/windows-portable-release.json
            install.ps1

      - name: Attach portable assets to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/cleanwin-*-windows-x64.zip
            artifacts/cleanwin-*-windows-x64.zip.sha256
            artifacts/install.ps1.sha256
            artifacts/windows-portable-release.json
            install.ps1

  scoop-bump:
    name: Bump scoop bucket
    needs: portable
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release asset to compute hash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/cleanwin-${VERSION}-windows-x64.zip"
          echo "Downloading $URL ..."
          curl -sL -o /tmp/cleanwin.zip "$URL"
          SHA256=$(sha256sum /tmp/cleanwin.zip | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_ENV"

      - name: Dispatch version bump to scoop bucket
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BUCKET_DISPATCH_TOKEN }}
          repository: imajinyun/cleanwin-bucket
          event-type: version-bump
          client-payload: |
            {
              "version": "${{ env.version }}",
              "sha256": "${{ env.sha256 }}"
            }
