name: Windows Smoke

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  windows-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip build
          .\.venv\Scripts\python.exe -m pip install -e .[dev]

      - name: Run pytest
        shell: pwsh
        run: |
          $env:PYTHONPATH = (Get-Location).Path
          New-Item -ItemType Directory -Force -Path artifacts/windows-smoke | Out-Null
          .\.venv\Scripts\python.exe -m pytest -q
          $exitCode = $LASTEXITCODE
          @{
            schema = "cleanwin.ci-pytest-result.v1"
            command = ".\\.venv\\Scripts\\python.exe -m pytest -q"
            exit_code = $exitCode
            passed = ($exitCode -eq 0)
            runner_os = $env:RUNNER_OS
            github_run_id = $env:GITHUB_RUN_ID
          } | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 artifacts/windows-smoke/pytest-result.json
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Lint
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows-smoke | Out-Null
          .\.venv\Scripts\python.exe -m ruff check cleanwin.py cleanwincli tests
          $exitCode = $LASTEXITCODE
          @{
            schema = "cleanwin.ci-ruff-result.v1"
            command = ".\\.venv\\Scripts\\python.exe -m ruff check cleanwin.py cleanwincli tests"
            exit_code = $exitCode
            passed = ($exitCode -eq 0)
            runner_os = $env:RUNNER_OS
            github_run_id = $env:GITHUB_RUN_ID
          } | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 artifacts/windows-smoke/ruff-result.json
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Type check
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows-smoke | Out-Null
          .\.venv\Scripts\python.exe -m mypy cleanwin.py cleanwincli tests
          $exitCode = $LASTEXITCODE
          @{
            schema = "cleanwin.ci-mypy-result.v1"
            command = ".\\.venv\\Scripts\\python.exe -m mypy cleanwin.py cleanwincli tests"
            exit_code = $exitCode
            passed = ($exitCode -eq 0)
            runner_os = $env:RUNNER_OS
            github_run_id = $env:GITHUB_RUN_ID
          } | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 artifacts/windows-smoke/mypy-result.json
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Compile Python files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows-smoke | Out-Null
          .\.venv\Scripts\python.exe -m compileall -q cleanwin.py cleanwincli tests
          $exitCode = $LASTEXITCODE
          @{
            schema = "cleanwin.ci-compile-result.v1"
            command = ".\\.venv\\Scripts\\python.exe -m compileall -q cleanwin.py cleanwincli tests"
            exit_code = $exitCode
            passed = ($exitCode -eq 0)
            runner_os = $env:RUNNER_OS
            github_run_id = $env:GITHUB_RUN_ID
          } | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 artifacts/windows-smoke/compile-result.json
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Docs smoke
        shell: pwsh
        run: |
          if (-not (Test-Path docs/doc/README.md)) { throw "missing docs/doc/README.md" }
          if (-not (Test-Path docs/doc/README.CN.md)) { throw "missing docs/doc/README.CN.md" }
          if ((Get-Item docs/doc/README.md).Length -le 0) { throw "empty docs/doc/README.md" }
          if ((Get-Item docs/doc/README.CN.md).Length -le 0) { throw "empty docs/doc/README.CN.md" }

      - name: AI readiness smoke
        shell: pwsh
        run: |
          $toolValidation = .\.venv\Scripts\python.exe cleanwin.py --json ai-tools --provider validation | ConvertFrom-Json
          if (-not $toolValidation.valid) { throw "ai-tools provider validation failed" }
          $readiness = .\.venv\Scripts\python.exe cleanwin.py --json ai-readiness --validate | ConvertFrom-Json
          if (-not $readiness.valid) { throw "ai-readiness validation failed" }
          $selfTest = .\.venv\Scripts\python.exe cleanwin.py --json ai-self-test | ConvertFrom-Json
          if (-not $selfTest.passed) { throw "ai-self-test failed" }
          $runbook = .\.venv\Scripts\python.exe cleanwin.py --json ai-runbook | ConvertFrom-Json
          if ($runbook.schema -ne "cleanwin.ai-runbook.v1") { throw "ai-runbook schema mismatch" }
          $doctor = .\.venv\Scripts\python.exe cleanwin.py --json doctor | ConvertFrom-Json
          if (-not $doctor.ready) { throw "doctor reported not ready" }

      - name: MCP server compile smoke
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m compileall -q cleanwincli/mcp_server.py

      - name: Version consistency smoke
        shell: pwsh
        run: |
          $doctor = .\.venv\Scripts\python.exe cleanwin.py --json doctor | ConvertFrom-Json
          $versionCheck = $doctor.checks | Where-Object { $_.id -eq "version_consistency" }
          if ($null -eq $versionCheck) { throw "missing version_consistency doctor check" }
          if (-not $versionCheck.passed) { throw "version_consistency doctor check failed" }

      - name: Capture Windows native collector sample
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows-native | Out-Null
          .\scripts\collect-cleanwin-artifacts.ps1 -Mode all -ArtifactRoot artifacts/windows-native | Set-Content -Encoding utf8 artifacts/windows-smoke/native-collector-summary.json
          if ($LASTEXITCODE -ne 0) { throw "native collector sample failed" }
          if (-not (Test-Path artifacts/windows-native/manifest.json)) { throw "missing native collector manifest" }

      - name: Capture Windows JSON evidence bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows-smoke | Out-Null
          $reports = @(
            @{ name = "windows-inventory"; args = @("windows-inventory"); file = "windows-inventory.json" },
            @{ name = "debloat-privacy-report"; args = @("debloat-privacy-report"); file = "debloat-privacy-report.json" },
            @{ name = "startup-service-inventory"; args = @("startup-service-inventory"); file = "startup-service-inventory.json" },
            @{ name = "system-health-report"; args = @("system-health-report"); file = "system-health-report.json" },
            @{ name = "promotion-gates"; args = @("promotion-gates"); file = "promotion-gates.json" },
            @{ name = "recovery-readiness"; args = @("recovery-readiness"); file = "recovery-readiness.json" },
            @{ name = "windows-smoke-matrix"; args = @("windows-smoke-matrix"); file = "windows-smoke-matrix.json" },
            @{ name = "windows-artifact-layout"; args = @("windows-artifact-layout"); file = "windows-artifact-layout.json" },
            @{ name = "windows-artifact-validate"; args = @("windows-artifact-validate", "--manifest", "artifacts/windows-native/manifest.json"); file = "windows-artifact-validation.json" },
            @{ name = "windows-native-artifacts"; args = @("windows-native-artifacts"); file = "windows-native-artifacts.json" }
          )
          foreach ($report in $reports) {
            $output = Join-Path "artifacts/windows-smoke" $report.file
            & .\.venv\Scripts\python.exe cleanwin.py --json @($report.args) | Set-Content -Encoding utf8 $output
            if ($LASTEXITCODE -ne 0) { throw "failed to capture $($report.name)" }
          }
          @'
          import json
          from cleanwincli.promotion_gates import validate_promotion_gate_action

          payload = validate_promotion_gate_action(
              source_report={"schema": "cleanwin.windows-inventory.v1"},
              proposed_action={
                  "target_action": "appx-provisioned-package-change",
                  "evidence": ["package_name"],
                  "snapshots": [],
                  "rollback_metadata": [],
                  "tests": [],
                  "human_confirmations": [],
              },
          )
          print(json.dumps(payload, indent=2, sort_keys=True))
          '@ | .\.venv\Scripts\python.exe - | Set-Content -Encoding utf8 artifacts/windows-smoke/promotion-gate-validation.json
          if ($LASTEXITCODE -ne 0) { throw "failed to capture promotion-gate-validation" }
          @{
            schema = "cleanwin.windows-ci-artifact-bundle.v1"
            runner_os = $env:RUNNER_OS
            github_run_id = $env:GITHUB_RUN_ID
            artifacts = @($reports | ForEach-Object { $_.file }) + @("promotion-gate-validation.json", "native-collector-summary.json")
            result_artifacts = @("pytest-result.json", "ruff-result.json", "mypy-result.json", "compile-result.json")
            native_artifact_root = "artifacts/windows-native"
            native_manifest = "artifacts/windows-native/manifest.json"
            destructive = $false
            executes_cleanup = $false
          } | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 artifacts/windows-smoke/manifest.json

      - name: Upload Windows JSON evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanwin-windows-json-evidence
          path: artifacts/windows-smoke/*.json
          if-no-files-found: warn

      - name: Upload Windows native collector artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanwin-windows-native-evidence
          path: artifacts/windows-native/**
          if-no-files-found: warn

      - name: Package build smoke
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m build --sdist --wheel

      - name: Package install smoke
        shell: pwsh
        run: |
          $installRoot = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString())
          try {
            python -m venv $installRoot
            $venvPython = Join-Path $installRoot "Scripts\python.exe"
            $venvCli = Join-Path $installRoot "Scripts\cleanwin.exe"
            $venvMcp = Join-Path $installRoot "Scripts\cleanwin-mcp.exe"
            $wheel = Get-ChildItem -Path dist -Filter "cleanwin-*.whl" | Sort-Object Name | Select-Object -Last 1
            if ($null -eq $wheel) { throw "missing built wheel" }
            & $venvPython -m pip install $wheel.FullName
            if (-not (Test-Path $venvCli)) { throw "missing cleanwin console script" }
            if (-not (Test-Path $venvMcp)) { throw "missing cleanwin-mcp console script" }
            $moduleDoctor = & $venvPython -m cleanwin --json doctor | ConvertFrom-Json
            if (-not $moduleDoctor.ready) { throw "installed cleanwin module doctor reported not ready" }
            $cliDoctor = & $venvCli --json doctor | ConvertFrom-Json
            if (-not $cliDoctor.ready) { throw "installed cleanwin CLI doctor reported not ready" }
            $mcpInitialize = @{ jsonrpc = "2.0"; id = 1; method = "initialize" } | ConvertTo-Json -Compress
            $mcpResponse = $mcpInitialize | & $venvMcp | ConvertFrom-Json
            if ($mcpResponse.result.serverInfo.name -ne "cleanwin-mcp") { throw "installed cleanwin MCP initialize failed" }
          }
          finally {
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $installRoot
          }

      - name: Source dist install smoke
        shell: pwsh
        run: |
          $installRoot = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString())
          try {
            python -m venv $installRoot
            $venvPython = Join-Path $installRoot "Scripts\python.exe"
            $venvCli = Join-Path $installRoot "Scripts\cleanwin.exe"
            $venvMcp = Join-Path $installRoot "Scripts\cleanwin-mcp.exe"
            $sdist = Get-ChildItem -Path dist -Filter "cleanwin-*.tar.gz" | Sort-Object Name | Select-Object -Last 1
            if ($null -eq $sdist) { throw "missing built sdist" }
            & $venvPython -m pip install $sdist.FullName
            if (-not (Test-Path $venvCli)) { throw "missing cleanwin console script from sdist install" }
            if (-not (Test-Path $venvMcp)) { throw "missing cleanwin-mcp console script from sdist install" }
            $moduleDoctor = & $venvPython -m cleanwin --json doctor | ConvertFrom-Json
            if (-not $moduleDoctor.ready) { throw "sdist cleanwin module doctor reported not ready" }
            $cliDoctor = & $venvCli --json doctor | ConvertFrom-Json
            if (-not $cliDoctor.ready) { throw "sdist cleanwin CLI doctor reported not ready" }
            $mcpInitialize = @{ jsonrpc = "2.0"; id = 1; method = "initialize" } | ConvertTo-Json -Compress
            $mcpResponse = $mcpInitialize | & $venvMcp | ConvertFrom-Json
            if ($mcpResponse.result.serverInfo.name -ne "cleanwin-mcp") { throw "sdist cleanwin MCP initialize failed" }
          }
          finally {
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $installRoot
          }

      - name: Identity drift smoke
        shell: pwsh
        run: |
          $tmp = New-Item -ItemType Directory -Path ([System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), [System.Guid]::NewGuid().ToString()))
          $tempRoot = New-Item -ItemType Directory -Path (Join-Path $tmp.FullName "Temp")
          $candidate = Join-Path $tempRoot.FullName "stale.tmp"
          Set-Content -Path $candidate -Value "x" -NoNewline
          $env:TEMP = $tempRoot.FullName
          $env:TMP = $tempRoot.FullName
          $env:APPDATA = Join-Path $tmp.FullName "Roaming"
          $env:LOCALAPPDATA = Join-Path $tmp.FullName "LocalAppData"
          $env:PROGRAMDATA = Join-Path $tmp.FullName "ProgramData"
          $env:PROGRAMFILES = Join-Path $tmp.FullName "ProgramFiles"
          $env:USERPROFILE = Join-Path $tmp.FullName "User"
          .\.venv\Scripts\python.exe cleanwin.py --json plan --categories temp --older-than-days 0 --max-items 1 --output (Join-Path $tmp.FullName "plan.json") | Out-Null
          Set-Content -Path $candidate -Value "changed" -NoNewline
          $oldNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          try {
            $result = .\.venv\Scripts\python.exe cleanwin.py --json validate-plan --plan-file (Join-Path $tmp.FullName "plan.json") --no-require-plan-context
            $validateExitCode = $LASTEXITCODE
          }
          finally {
            $PSNativeCommandUseErrorActionPreference = $oldNativeCommandPreference
          }
          $result | Write-Output
          if ($validateExitCode -eq 0) { throw "validate-plan should fail after identity drift" }
          if ($validateExitCode -ne 2) { throw "validate-plan should exit 2 after identity drift, got $validateExitCode" }
          if (-not ($result -join "`n").Contains("Filesystem identity mismatch")) { throw "missing identity mismatch error" }
          & cmd /c exit 0

      - name: Test-mode recycle smoke
        shell: pwsh
        run: |
          $tmp = New-Item -ItemType Directory -Path ([System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), [System.Guid]::NewGuid().ToString()))
          $tempRoot = New-Item -ItemType Directory -Path (Join-Path $tmp.FullName "Temp")
          $candidate = Join-Path $tempRoot.FullName "stale.tmp"
          Set-Content -Path $candidate -Value "x" -NoNewline
          $env:CLEANWIN_TEST_MODE = "1"
          $env:TEMP = $tempRoot.FullName
          $env:TMP = $tempRoot.FullName
          $env:APPDATA = Join-Path $tmp.FullName "Roaming"
          $env:LOCALAPPDATA = Join-Path $tmp.FullName "LocalAppData"
          $env:PROGRAMDATA = Join-Path $tmp.FullName "ProgramData"
          $env:PROGRAMFILES = Join-Path $tmp.FullName "ProgramFiles"
          $env:USERPROFILE = Join-Path $tmp.FullName "User"
          $plan = Join-Path $tmp.FullName "plan.json"
          .\.venv\Scripts\python.exe cleanwin.py --json plan --categories temp --older-than-days 0 --max-items 1 --output $plan | Out-Null
          $dry = .\.venv\Scripts\python.exe cleanwin.py --json execute-plan --plan-file $plan --no-require-plan-context | ConvertFrom-Json
          .\.venv\Scripts\python.exe cleanwin.py --json execute-plan --plan-file $plan --execute --yes --no-require-plan-context --trash-root (Join-Path $tmp.FullName "trash") --operation-log (Join-Path $tmp.FullName "ops.jsonl") --confirmation-phrase $dry.confirmation.required_phrase --confirmation-token $dry.confirmation.confirmation_token | Out-Null
          if (Test-Path $candidate) { throw "candidate should have moved to test trash" }

      - name: Install script smoke
        shell: pwsh
        run: |
          $version = .\.venv\Scripts\python.exe -c "from cleanwincli import __version__; print(__version__)"
          $archive = "cleanwin-$version-windows-x64.zip"
          $stagingDir = Join-Path ([System.IO.Path]::GetTempPath()) ("cleanwin-install-smoke-" + [Guid]::NewGuid().ToString())
          $portableDir = Join-Path $stagingDir "portable"
          $installDir = Join-Path $stagingDir "install"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          # Build a minimal mock portable zip from the source tree
          Copy-Item cleanwin.py (Join-Path $portableDir "cleanwin.py")
          New-Item -ItemType Directory -Force -Path (Join-Path $portableDir "cleanwincli") | Out-Null
          Get-ChildItem cleanwincli -Filter *.py | Copy-Item -Destination (Join-Path $portableDir "cleanwincli")
          Set-Content -Path (Join-Path $portableDir "cleanwin.exe") -Value "@echo off`npython %~dp0cleanwin.py %*" -Encoding ascii
          Set-Content -Path (Join-Path $portableDir "cleanwin-mcp.exe") -Value "@echo off`npython -m cleanwincli.mcp_server %*" -Encoding ascii
          Set-Content -Path (Join-Path $portableDir "LICENSE") -Value "MIT" -Encoding ascii
          Set-Content -Path (Join-Path $portableDir "README.md") -Value "# cleanwin" -Encoding ascii

          Compress-Archive -Path (Join-Path $portableDir "*") -DestinationPath (Join-Path $stagingDir $archive) -Force
          $hash = (Get-FileHash (Join-Path $stagingDir $archive) -Algorithm SHA256).Hash
          "$hash  $archive" | Set-Content -Encoding ascii (Join-Path $stagingDir "$archive.sha256")

          try {
            $mockRelease = @{
              tag_name = "v$version"
              assets = @(
                @{ name = $archive; browser_download_url = "file://$(Join-Path $stagingDir $archive)" },
                @{ name = "$archive.sha256"; browser_download_url = "file://$(Join-Path $stagingDir "$archive.sha256")" }
              )
            }
            $mockReleaseJson = $mockRelease | ConvertTo-Json -Depth 4 -Compress
            $mockReleasePath = Join-Path $stagingDir "release.json"
            Set-Content -Path $mockReleasePath -Value $mockReleaseJson -Encoding utf8

            $mockInstaller = Join-Path $stagingDir "install-smoke.ps1"
            $installerContent = Get-Content -LiteralPath "install.ps1" -Raw
            $installerContent = $installerContent -replace [regex]::Escape('Invoke-RestMethod -Uri $ReleaseApi -Headers @{ "User-Agent" = "cleanwin-installer" }'), "Get-Content -LiteralPath '$mockReleasePath' -Raw | ConvertFrom-Json"
            $installerContent = $installerContent -replace [regex]::Escape('Invoke-WebRequest -Uri $ArchiveAsset.browser_download_url -OutFile $ArchivePath -Headers @{ "User-Agent" = "cleanwin-installer" }'), 'Copy-Item -LiteralPath ([Uri]$ArchiveAsset.browser_download_url).LocalPath -Destination $ArchivePath'
            $installerContent = $installerContent -replace [regex]::Escape('Invoke-WebRequest -Uri $ChecksumAsset.browser_download_url -OutFile $ChecksumPath -Headers @{ "User-Agent" = "cleanwin-installer" }'), 'Copy-Item -LiteralPath ([Uri]$ChecksumAsset.browser_download_url).LocalPath -Destination $ChecksumPath'
            Set-Content -Path $mockInstaller -Value $installerContent -Encoding utf8

            & $mockInstaller -InstallDir $installDir -NoPathUpdate
            if (-not (Test-Path (Join-Path $installDir "cleanwin.py") -PathType Leaf)) { throw "install failed: cleanwin.py missing" }
            Write-Host "install completed successfully"

            & $mockInstaller -InstallDir $installDir -NoPathUpdate
            Write-Host "reinstall (same version) completed without error"

            & $mockInstaller -InstallDir $installDir -Uninstall -NoPathUpdate
            if (Test-Path $installDir) { throw "uninstall failed: directory still exists" }
            Write-Host "uninstall completed successfully"
          } finally {
            if (Test-Path $stagingDir) {
              Remove-Item -LiteralPath $stagingDir -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Cleanup generated artifacts
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue build, dist, cleanwin.egg-info, .mypy_cache, .ruff_cache, .pytest_cache, .coverage, coverage.xml, htmlcov
          Get-ChildItem -Path . -Directory -Recurse -Force -Filter __pycache__ | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
