name: Windows Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip build
          .\.venv\Scripts\python.exe -m pip install -e .[dev]

      - name: Run unit tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = (Get-Location).Path
          .\.venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Run pytest
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m pytest -q

      - name: Lint
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m ruff check cleanwin.py cleanwincli tests

      - name: Type check
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m mypy cleanwin.py cleanwincli tests

      - name: Compile Python files
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m compileall -q cleanwin.py cleanwincli tests

      - name: Docs smoke
        shell: pwsh
        run: |
          if (-not (Test-Path docs/doc/README.md)) { throw "missing docs/doc/README.md" }
          if (-not (Test-Path docs/doc/README.CN.md)) { throw "missing docs/doc/README.CN.md" }
          if ((Get-Item docs/doc/README.md).Length -le 0) { throw "empty docs/doc/README.md" }
          if ((Get-Item docs/doc/README.CN.md).Length -le 0) { throw "empty docs/doc/README.CN.md" }

      - name: AI readiness smoke
        shell: pwsh
        run: |
          $toolValidation = .\.venv\Scripts\python.exe cleanwin.py --json ai-tools --provider validation | ConvertFrom-Json
          if (-not $toolValidation.valid) { throw "ai-tools provider validation failed" }
          $readiness = .\.venv\Scripts\python.exe cleanwin.py --json ai-readiness --validate | ConvertFrom-Json
          if (-not $readiness.valid) { throw "ai-readiness validation failed" }
          $selfTest = .\.venv\Scripts\python.exe cleanwin.py --json ai-self-test | ConvertFrom-Json
          if (-not $selfTest.passed) { throw "ai-self-test failed" }
          $runbook = .\.venv\Scripts\python.exe cleanwin.py --json ai-runbook | ConvertFrom-Json
          if ($runbook.schema -ne "cleanwin.ai-runbook.v1") { throw "ai-runbook schema mismatch" }
          $doctor = .\.venv\Scripts\python.exe cleanwin.py --json doctor | ConvertFrom-Json
          if (-not $doctor.ready) { throw "doctor reported not ready" }

      - name: MCP server compile smoke
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m compileall -q cleanwincli/mcp_server.py

      - name: Version consistency smoke
        shell: pwsh
        run: |
          $doctor = .\.venv\Scripts\python.exe cleanwin.py --json doctor | ConvertFrom-Json
          $versionCheck = $doctor.checks | Where-Object { $_.id -eq "version_consistency" }
          if ($null -eq $versionCheck) { throw "missing version_consistency doctor check" }
          if (-not $versionCheck.passed) { throw "version_consistency doctor check failed" }

      - name: Package build smoke
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m build --sdist --wheel

      - name: Package install smoke
        shell: pwsh
        run: |
          $installRoot = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString())
          try {
            python -m venv $installRoot
            $venvPython = Join-Path $installRoot "Scripts\python.exe"
            $venvCli = Join-Path $installRoot "Scripts\cleanwin.exe"
            $venvMcp = Join-Path $installRoot "Scripts\cleanwin-mcp.exe"
            $wheel = Get-ChildItem -Path dist -Filter "cleanwin-*.whl" | Sort-Object Name | Select-Object -Last 1
            if ($null -eq $wheel) { throw "missing built wheel" }
            & $venvPython -m pip install $wheel.FullName
            if (-not (Test-Path $venvCli)) { throw "missing cleanwin console script" }
            if (-not (Test-Path $venvMcp)) { throw "missing cleanwin-mcp console script" }
            $moduleDoctor = & $venvPython -m cleanwin --json doctor | ConvertFrom-Json
            if (-not $moduleDoctor.ready) { throw "installed cleanwin module doctor reported not ready" }
            $cliDoctor = & $venvCli --json doctor | ConvertFrom-Json
            if (-not $cliDoctor.ready) { throw "installed cleanwin CLI doctor reported not ready" }
            $mcpInitialize = @{ jsonrpc = "2.0"; id = 1; method = "initialize" } | ConvertTo-Json -Compress
            $mcpResponse = $mcpInitialize | & $venvMcp | ConvertFrom-Json
            if ($mcpResponse.result.serverInfo.name -ne "cleanwin-mcp") { throw "installed cleanwin MCP initialize failed" }
          }
          finally {
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $installRoot
          }

      - name: Source dist install smoke
        shell: pwsh
        run: |
          $installRoot = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString())
          try {
            python -m venv $installRoot
            $venvPython = Join-Path $installRoot "Scripts\python.exe"
            $venvCli = Join-Path $installRoot "Scripts\cleanwin.exe"
            $venvMcp = Join-Path $installRoot "Scripts\cleanwin-mcp.exe"
            $sdist = Get-ChildItem -Path dist -Filter "cleanwin-*.tar.gz" | Sort-Object Name | Select-Object -Last 1
            if ($null -eq $sdist) { throw "missing built sdist" }
            & $venvPython -m pip install $sdist.FullName
            if (-not (Test-Path $venvCli)) { throw "missing cleanwin console script from sdist install" }
            if (-not (Test-Path $venvMcp)) { throw "missing cleanwin-mcp console script from sdist install" }
            $moduleDoctor = & $venvPython -m cleanwin --json doctor | ConvertFrom-Json
            if (-not $moduleDoctor.ready) { throw "sdist cleanwin module doctor reported not ready" }
            $cliDoctor = & $venvCli --json doctor | ConvertFrom-Json
            if (-not $cliDoctor.ready) { throw "sdist cleanwin CLI doctor reported not ready" }
            $mcpInitialize = @{ jsonrpc = "2.0"; id = 1; method = "initialize" } | ConvertTo-Json -Compress
            $mcpResponse = $mcpInitialize | & $venvMcp | ConvertFrom-Json
            if ($mcpResponse.result.serverInfo.name -ne "cleanwin-mcp") { throw "sdist cleanwin MCP initialize failed" }
          }
          finally {
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $installRoot
          }

      - name: Identity drift smoke
        shell: pwsh
        run: |
          $tmp = New-Item -ItemType Directory -Path ([System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), [System.Guid]::NewGuid().ToString()))
          $tempRoot = New-Item -ItemType Directory -Path (Join-Path $tmp.FullName "Temp")
          $candidate = Join-Path $tempRoot.FullName "stale.tmp"
          Set-Content -Path $candidate -Value "x" -NoNewline
          $env:TEMP = $tempRoot.FullName
          $env:TMP = $tempRoot.FullName
          .\.venv\Scripts\python.exe cleanwin.py --json plan --categories temp --older-than-days 0 --output (Join-Path $tmp.FullName "plan.json") | Out-Null
          Set-Content -Path $candidate -Value "changed" -NoNewline
          .\.venv\Scripts\python.exe cleanwin.py --json validate-plan --plan-file (Join-Path $tmp.FullName "plan.json") --no-require-plan-context | Tee-Object -Variable result
          if ($LASTEXITCODE -eq 0) { throw "validate-plan should fail after identity drift" }
          if (-not ($result -join "`n").Contains("Filesystem identity mismatch")) { throw "missing identity mismatch error" }

      - name: Test-mode recycle smoke
        shell: pwsh
        run: |
          $tmp = New-Item -ItemType Directory -Path ([System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), [System.Guid]::NewGuid().ToString()))
          $tempRoot = New-Item -ItemType Directory -Path (Join-Path $tmp.FullName "Temp")
          $candidate = Join-Path $tempRoot.FullName "stale.tmp"
          Set-Content -Path $candidate -Value "x" -NoNewline
          $env:CLEANWIN_TEST_MODE = "1"
          $env:TEMP = $tempRoot.FullName
          $env:TMP = $tempRoot.FullName
          $plan = Join-Path $tmp.FullName "plan.json"
          .\.venv\Scripts\python.exe cleanwin.py --json plan --categories temp --older-than-days 0 --output $plan | Out-Null
          $dry = .\.venv\Scripts\python.exe cleanwin.py --json execute-plan --plan-file $plan --no-require-plan-context | ConvertFrom-Json
          .\.venv\Scripts\python.exe cleanwin.py --json execute-plan --plan-file $plan --execute --yes --no-require-plan-context --trash-root (Join-Path $tmp.FullName "trash") --operation-log (Join-Path $tmp.FullName "ops.jsonl") --confirmation-phrase $dry.confirmation.required_phrase --confirmation-token $dry.confirmation.confirmation_token | Out-Null
          if (Test-Path $candidate) { throw "candidate should have moved to test trash" }

      - name: Cleanup generated artifacts
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue build, dist, cleanwin.egg-info, .mypy_cache, .ruff_cache
          Get-ChildItem -Path . -Directory -Recurse -Force -Filter __pycache__ | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
